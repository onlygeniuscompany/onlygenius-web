<!doctype html>
<html lang="en"> 
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/Grey BG with Tagline.jpg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OnlyGenius</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
       <!-- Intercom -->
    <script>
      var APP_ID = "c033dvjq"; // Replace this with your workspace ID
      window.intercomSettings = { app_id: APP_ID };
    </script>
    <script>
      (function(){
        var w=window;var ic=w.Intercom;
        if(typeof ic==="function"){
          ic('reattach_activator');ic('update',w.intercomSettings);
        } else {
          var d=document;var i=function(){i.c(arguments);};i.q=[];
          i.c=function(args){i.q.push(args);};w.Intercom=i;
          var l=function(){
            var s=d.createElement('script');s.type='text/javascript';
            s.async=true;s.src='https://widget.intercom.io/widget/' + APP_ID;
            var x=d.getElementsByTagName('script')[0];x.parentNode.insertBefore(s,x);
          };
          if(document.readyState==='complete'){l();}
          else if(w.attachEvent){w.attachEvent('onload',l);}
          else{w.addEventListener('load',l,false);}
        }
      })();
    </script>
    <!-- End Intercom -->
     
    <!-- Boot call para visitantes anónimos -->
  <script>
    window.Intercom("boot", {
      app_id: "c033dvjq"
    });
  </script>
  </body>
</html>
